services:
  - type: web
    name: ml-predictor
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MODEL_PATH
        value: ../model/best.pt
      - key: ALLOWED_ORIGINS
        value: https://your-app.netlify.app
      - key: PYTHON_VERSION
        value: 3.11.0
