services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - MODEL_PATH=model/best.pt
    volumes:
      - ./model:/app/model:ro

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3000:8080"
    depends_on:
      - backend
